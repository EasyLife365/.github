name: SPA Build

on:
  workflow_call:
    inputs:
      app-location:
        description: The project location of the app
        required: true
        type: string
      app-target:
        description: The project target of the app
        required: true
        type: string
      app-artifact:
        description: The project artifact of the app
        required: true
        type: string
      yarn:
        description: Use Yarn v1 for dependency installation
        required: false
        type: boolean
        default: false

    secrets:
      package-token: 
        description: The nuget token to restore the packages
        required: true

env:
  CI: false

permissions:
   id-token: write
   contents: read

jobs:
  build:
    runs-on: 'ubuntu-latest'
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@easylife365'

      - name: Install Yarn v1
        if: ${{ inputs.yarn }}
        run: npm install -g yarn@1

      - name: Install dependencies
        if: ${{ inputs.yarn }}
        run: yarn install --frozen-lockfile
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.package-token }}

      - uses: bahmutov/npm-install@v1
        if: ${{ !inputs.yarn }}
        with:
          working-directory: ${{ inputs.app-location }}
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.package-token }}

      - uses: EasyLife365/get-version-action@v1
        id: version

      - name: Set version (npm)
        if: ${{ !inputs.yarn }}
        run: npm version ${{ steps.version.outputs.versionWithoutV }} --no-git-tag-version
        working-directory: ${{ inputs.app-location }}

      - name: Set version (yarn)
        if: ${{ inputs.yarn }}
        run: yarn version --new-version ${{ steps.version.outputs.versionWithoutV }} --no-git-tag-version
        working-directory: ${{ inputs.app-location }}
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.package-token }}

      - name: Build (npm)
        if: ${{ !inputs.yarn }}
        run: "npm run build:${{ inputs.app-target }}"
        working-directory: ${{ inputs.app-location }}
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.package-token }}

      - name: Build (yarn)
        if: ${{ inputs.yarn }}
        run: "yarn build:${{ inputs.app-target }}"
        working-directory: ${{ inputs.app-location }}
        env:
          GITHUB_PACKAGE_TOKEN: ${{ secrets.package-token }}

      - name: Upload build app artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.app-artifact }}
          path: "${{ inputs.app-location }}/dist"
          include-hidden-files: true
          retention-days: 15
